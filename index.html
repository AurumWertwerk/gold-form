<!DOCTYPE html>
<html>
<head>
  <title>Weiterleitung...</title>
</head>
<body>

<script>
const params = new URLSearchParams(window.location.search);

fetch("https://script.google.com/macros/s/AKfycby9US-MJrBZpTbFcS6LVT9rudJ_y6A-etZACdCH5Pz2mArZifsCA7T28ffS5j59JgK9LQ/exec", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    vorname: params.get("vorname"),
    nachname: params.get("nachname"),
    strasse: params.get("strasse"),
    plz: params.get("plz"),
    stadt: params.get("stadt"),
    telefon: params.get("telefon")
  })
})
.then(res => res.json())
.then(data => {
  window.location.href = data.redirect;
});
</script>

</body>
</html>
