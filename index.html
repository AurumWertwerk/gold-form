<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Sparplan</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.container {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  width: 100%;
  max-width: 400px;
}

h2 {
  margin-bottom: 10px;
}

.top-text {
  font-size: 14px;
  color: #cbd5f5;
  margin-bottom: 20px;
  line-height: 1.4;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #facc15;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #eab308;
}

.small {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 10px;
}

#status {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Gold Sparplan starten</h2>

  <!-- TEXT OBEN (wieder drin) -->
  <div class="top-text">
    Sichere dein Vermögen außerhalb des Systems.  
    Starte jetzt deinen persönlichen Goldsparplan.
  </div>

  <form id="form">

    <input type="text" name="vorname" placeholder="Vorname" required>
    <input type="text" name="nachname" placeholder="Nachname" required>
    <input type="text" name="strasse" placeholder="Straße" required>
    <input type="text" name="plz" placeholder="PLZ" required>
    <input type="text" name="stadt" placeholder="Stadt" required>
    <input type="text" name="telefon" placeholder="Telefon" required>

    <!-- Honeypot -->
    <input type="text" name="website" style="display:none">

    <button type="submit">Absenden</button>

  </form>

  <div id="status"></div>

  <div class="small">
    Keine Weitergabe. Kein Verkauf. Deine Daten dienen ausschließlich deinem Goldsparplan.
  </div>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbylRwi9HksNVEtHcOljqc9yHvB52LJfj65v-n4q7jyG0zn-cq4wiUdRDFotBjoh1UuJgw/exec";

let lastSubmit = 0;
const loadTime = Date.now();

function generateID() {
  const now = new Date();
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  const rand = Math.floor(1000 + Math.random() * 9000);
  return mm + ss + "-" + rand;
}

document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const status = document.getElementById("status");

  const now = Date.now();
  if (now - lastSubmit < 5000) {
    status.innerText = "Bitte kurz warten...";
    return;
  }
  lastSubmit = now;

  const formData = new FormData(this);

  // Honeypot
  if (formData.get("website")) {
    status.innerText = "Fehler";
    return;
  }

  const data = {
    vorname: formData.get("vorname"),
    nachname: formData.get("nachname"),
    strasse: formData.get("strasse"),
    plz: formData.get("plz"),
    stadt: formData.get("stadt"),
    telefon: formData.get("telefon"),
    id: generateID(),
    loadTime: loadTime
  };

  status.innerText = "Wird gesendet...";

  try {
    const res = await fetch(WEBAPP_URL, {
      method: "POST",
      body: new URLSearchParams(data)
    });

    const text = await res.text();

    if (text === "OK") {
      status.innerText = "Erfolgreich gesendet";
      this.reset();
    } else {
      status.innerText = "Server antwortet nicht korrekt";
      console.log(text);
    }

  } catch (err) {
    status.innerText = "Verbindung fehlgeschlagen";
    console.error(err);
  }
});
</script>

</body>
</html>
