<!DOCTYPE html>
<html>
<head>
  <title>Verarbeitung...</title>
</head>
<body>

<p>Daten werden verarbeitet...</p>

<script>
const params = new URLSearchParams(window.location.search);

fetch("https://script.google.com/macros/s/AKfycbzcFOnnqYIE6oS6636h6ojVYEFbn4U_GrH687X8BO7QR4EF6M7dfOkRfISc_-u7dq0y4w/exec", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    vorname: params.get("vorname"),
    nachname: params.get("nachname"),
    strasse: params.get("strasse"),
    plz: params.get("plz"),
    stadt: params.get("stadt"),
    telefon: params.get("telefon"),
    email: params.get("email")
  })
})
.then(res => res.json())
.then(data => {
  window.location.href = data.redirect;
})
.catch(err => {
  document.body.innerHTML = "Fehler bei der Verarbeitung";
});
</script>

</body>
</html>
